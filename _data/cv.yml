- title: Research Experience
  type: time_table
  contents:
    - title: Learning Semantics, Structure, and Geometry from Cross-View Localization
      institution: CASIA
      year: 2025 -- present
      description:
        - Investigated cross-view localization as a learning framework for stable semantics, reliable structure, and transferable geometry.
        - Proposed CROSS, a unified framework with 3D-grounded alignment, structure-aware matching, and hypothesis ranking, reducing localization error by up to 70% compared to state-of-the-art methods.
        - Proposed WARG for lunar rover localization, modeling rover scenes as reprojected graphs for view-invariant spatial matching.
        - Achieved 1.68 m localization error on the YuTu-2 dataset, significantly outperforming prior methods.

    - title: Fine-Grained Multimodal Alignment via Graph Learning
      institution: CASIA
      year: 2024 -- 2026
      description:
        - Addressed limitations in fine-grained multimodal alignment, including fragment-based fusion, redundant matching, and multimodal inconsistency.
        - Proposed GFGA to model correspondences between visual regions and textual components.
        - Enabled fine-grained cross-modal interaction and disambiguation through graph fusion and matching.
        - Achieved state-of-the-art results on MS-COCO and Flickr30K, with a first-author publication in IJCV.

    - title: Graph Neural Networks for Dynamic Spatiotemporal Forecasting
      institution: Beihang University
      year: 2022 -- 2024
      description:
        - Investigated dynamic spatial-temporal dependencies in traffic systems.
        - Developed structure-semantic coupled and multi-faceted graph learning frameworks for adaptive dependency modeling.
        - Designed mechanisms for dynamic graph construction and temporal interaction, improving flexibility and robustness.
        - Improved prediction performance across benchmarks, contributing to publications in Information Fusion and Knowledge-Based Systems.

